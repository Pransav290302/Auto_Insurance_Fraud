{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="card auth-card">
        <h2 class="auth-title">Create account</h2>
        <p class="card-why">Register to access Auto Insurance Fraud Detection &amp; Loss Severity app. Your login is stored securely.</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('register') }}" id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 4 characters" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="register-btn">Register</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent2); font-weight:600;">Log in</a></p>
    </div>
</div>
<script>
document.getElementById('register-form').addEventListener('submit', function() {
    var btn = document.getElementById('register-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Creating account…'; }
});
</script>
<style>
    .auth-wrap { max-width: 420px; margin: 3rem auto; }
    .auth-card { text-align: center; }
    .auth-title { margin-bottom: 0.5rem; }
    .btn-block { width: 100%; }
    .auth-footer { margin-top: 1.25rem; font-size: 0.9rem; color: var(--text-muted); }
</style>
{% endblock %}
